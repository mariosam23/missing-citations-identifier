services:
  papers_db:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: localhost
    ports:
      - "25432:5432"
    volumes:
      - papers_db:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  grobid:
    image: lfoppiano/grobid:0.8.1
    restart: unless-stopped
    ports:
      - "8070:8070"

volumes:
  papers_db:
    driver: local
  qdrant_data:
    driver: local
